services:
  mysql:
    image: docker.m.daocloud.io/library/mysql:8.0
    container_name: chat_mysql
    restart: unless-stopped
    # 老版 mysqlcppconn(JDBC) 对 caching_sha2_password 兼容差，强制用 native 插件
    command: --default-authentication-plugin=mysql_native_password   # 新写法
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: ChatHttpServer
    ports:
      - "3307:3306"  # 宿主机 3306 被残留进程占用,临时改 3307;ChatServer.cpp 同步改 3307
    volumes:
      - mysql_data:/var/lib/mysql
      # 首次启动自动建表（仅在数据卷为空时执行一次）
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  rabbitmq:
    image: docker.m.daocloud.io/library/rabbitmq:management 
    container_name: chat_rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"     # AMQP，应用连这个
      - "15672:15672"   # 管理后台 http://localhost:15672 (guest/guest)
    volumes:
      # 关闭 guest 仅限回环的限制，否则容器外用 guest 连接会被拒
      - ./docker/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro

volumes:
  mysql_data:
