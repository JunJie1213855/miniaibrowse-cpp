<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>AI 聊天助手</title>
    <style>
        /* ═══════════════════════════════════════════════════════════════════
         * Design Tokens — adapted from ai-websource design system
         * ═══════════════════════════════════════════════════════════════════ */
        :root {
            --bg: #fafafa;
            --surface: #ffffff;
            --fg: #111111;
            --muted: #6b6b6b;
            --border: #e5e5e5;
            --accent: #4ade80;
            --accent-on: #111111;
            --accent-hover: color-mix(in oklab, var(--accent), black 12%);
            --accent-active: color-mix(in oklab, var(--accent), black 20%);
            --accent-subtle: color-mix(in oklab, var(--accent) 10%, transparent);
            --success: #17a34a;
            --danger: #dc2626;
            --font-display: "Inter", "Microsoft YaHei", -apple-system, system-ui, sans-serif;
            --font-body: "Inter", "Microsoft YaHei", -apple-system, system-ui, sans-serif;
            --font-mono: ui-monospace, "JetBrains Mono", monospace;
            --text-xs: 12px;
            --text-sm: 14px;
            --text-base: 16px;
            --text-lg: 20px;
            --text-xl: 24px;
            --leading-body: 1.5;
            --leading-tight: 1.2;
            --space-1: 4px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 20px;
            --space-6: 24px;
            --space-8: 32px;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-pill: 9999px;
            --elev-flat: none;
            --elev-ring: 0 0 0 1px var(--border);
            --elev-raised: 0 2px 8px color-mix(in oklab, var(--fg), transparent 92%);
            --focus-ring: 0 0 0 3px color-mix(in oklab, var(--accent), transparent 70%);
            --motion-fast: 150ms;
            --motion-base: 200ms;
            --ease-standard: cubic-bezier(0.2, 0, 0, 1);
        }

        /* ═══════════════════════════════════════════════════════════════════
         * Reset & Global
         * ═══════════════════════════════════════════════════════════════════ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            font-family: var(--font-body);
            font-size: var(--text-base);
            background: var(--bg);
            color: var(--fg);
            line-height: var(--leading-body);
            -webkit-font-smoothing: antialiased;
        }

        body {
            display: flex;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb {
            background: color-mix(in oklab, var(--muted), transparent 60%);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: color-mix(in oklab, var(--muted), transparent 40%);
        }

        /* ═══════════════════════════════════════════════════════════════════
         * Session Sidebar
         * ═══════════════════════════════════════════════════════════════════ */
        .session-list {
            width: 240px;
            min-width: 240px;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            border-right: 1px solid var(--border);
            overflow: hidden;
        }

        .session-list-header {
            padding: var(--space-4);
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .session-list-title {
            font-size: var(--text-sm);
            font-weight: 600;
            color: var(--fg);
            margin-bottom: var(--space-3);
        }

        .new-chat-btn {
            width: 100%;
            padding: var(--space-2) 0;
            cursor: pointer;
            background: var(--accent);
            color: var(--accent-on);
            border: none;
            border-radius: var(--radius-md);
            font-size: var(--text-sm);
            font-weight: 600;
            font-family: var(--font-body);
            transition: background var(--motion-fast) var(--ease-standard);
        }
        .new-chat-btn:hover { background: var(--accent-hover); }
        .new-chat-btn:active { background: var(--accent-active); }
        .new-chat-btn:focus-visible {
            outline: none;
            box-shadow: var(--focus-ring);
        }

        .session-list ul {
            list-style: none;
            padding: var(--space-2);
            margin: 0;
            flex: 1;
            overflow-y: auto;
        }

        .session-list li {
            padding: var(--space-3) var(--space-4);
            margin: 0 0 var(--space-1) 0;
            cursor: pointer;
            border-radius: var(--radius-md);
            border: 1px solid transparent;
            color: var(--fg);
            width: 100%;
            font-size: var(--text-sm);
            box-sizing: border-box;
            transition: background var(--motion-fast) var(--ease-standard),
                        border-color var(--motion-fast) var(--ease-standard);
        }

        .session-list li.active {
            background: var(--accent-subtle);
            color: var(--fg);
            font-weight: 500;
            border-color: color-mix(in oklab, var(--accent) 35%, transparent);
        }

        .session-list li:hover:not(.active) {
            background: var(--accent-subtle);
            border-color: transparent;
        }

        .session-list li:focus-visible {
            outline: none;
            box-shadow: var(--focus-ring);
        }

        /* ═══════════════════════════════════════════════════════════════════
         * Chat Section
         * ═══════════════════════════════════════════════════════════════════ */
        .chat-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        /* --- Top Bar & Model Chips --- */
        .top-bar {
            padding: var(--space-3) var(--space-6);
            display: flex;
            align-items: center;
            gap: var(--space-3);
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            min-height: 56px;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .top-bar label {
            font-size: var(--text-sm);
            color: var(--muted);
            font-weight: 500;
        }

        /* Visually hide native select but keep it functional */
        #modelType {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .sync-btn {
            padding: var(--space-1) var(--space-3);
            border: 1px solid var(--border);
            border-radius: var(--radius-pill);
            cursor: pointer;
            font-size: var(--text-sm);
            font-family: var(--font-body);
            background: var(--surface);
            color: var(--fg);
            transition: border-color var(--motion-fast) var(--ease-standard),
                        background var(--motion-fast) var(--ease-standard);
        }
        .sync-btn:hover {
            border-color: var(--accent);
            background: var(--accent-subtle);
        }
        .sync-btn:focus-visible {
            outline: none;
            box-shadow: var(--focus-ring);
        }

        /* --- Collapsible Model Picker --- */
        .model-picker {
            position: relative;
            flex-shrink: 0;
        }

        .model-toggle {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            padding: var(--space-1) var(--space-3);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-pill);
            font-size: var(--text-sm);
            font-family: var(--font-body);
            color: var(--fg);
            cursor: pointer;
            white-space: nowrap;
            transition: border-color var(--motion-fast) var(--ease-standard),
                        box-shadow var(--motion-fast) var(--ease-standard);
        }
        .model-toggle:hover {
            border-color: var(--accent);
        }
        .model-toggle:focus-visible {
            outline: none;
            box-shadow: var(--focus-ring);
        }
        .model-toggle .arrow {
            font-size: 10px;
            color: var(--muted);
            transition: transform var(--motion-fast) var(--ease-standard);
        }
        .model-picker.open .model-toggle .arrow {
            transform: rotate(180deg);
        }

        .model-dropdown {
            display: none;
            position: absolute;
            top: calc(100% + var(--space-1));
            right: 0;
            min-width: 180px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            box-shadow: var(--elev-raised);
            z-index: 10;
            overflow: hidden;
        }
        .model-picker.open .model-dropdown {
            display: block;
        }

        .model-option {
            display: block;
            width: 100%;
            padding: var(--space-2) var(--space-4);
            border: none;
            background: transparent;
            font-size: var(--text-sm);
            font-family: var(--font-body);
            color: var(--fg);
            cursor: pointer;
            text-align: left;
            transition: background var(--motion-fast) var(--ease-standard);
        }
        .model-option:hover {
            background: var(--accent-subtle);
        }
        .model-option.active {
            background: var(--accent-subtle);
            color: var(--accent);
            font-weight: 500;
        }
        .model-option:focus-visible {
            outline: none;
            box-shadow: inset var(--focus-ring);
        }

        /* --- Scroll area: flex wrapper holding chat + position rail as siblings --- */
        .chat-scroll-area {
            flex: 1;
            display: flex;
            min-height: 0;
            position: relative;
            background: var(--bg);
        }

        /* --- Messages --- */
        .chat-container {
            flex: 1;
            min-width: 0;
            overflow-y: auto;
            padding: var(--space-6);
            display: flex;
            flex-direction: column;
            gap: var(--space-6);
            background: var(--bg);
            scroll-behavior: smooth;
        }

        /* --- Position Rail — flex sibling of chat-container, fixed navigation track --- */
        .position-rail {
            flex-shrink: 0;
            width: 32px;
            padding: 12px 8px;
            display: flex;
            justify-content: center;
            align-items: stretch;
            user-select: none;
            z-index: 5;
        }

        .position-rail-track {
            position: relative;
            width: 16px;
            height: 100%;
            background: color-mix(in oklab, var(--muted) 10%, transparent);
            border-radius: var(--radius-pill);
            cursor: pointer;
            transition: background var(--motion-fast);
        }
        .position-rail-track:hover {
            background: color-mix(in oklab, var(--muted) 18%, transparent);
        }

        /* Scroll thumb — shows current viewport position, sized & positioned by JS */
        .position-rail-thumb {
            position: absolute;
            left: 1px;
            right: 1px;
            background: var(--muted);
            border-radius: var(--radius-pill);
            opacity: 0.5;
            transition: opacity var(--motion-fast);
            pointer-events: none;
        }
        .position-rail-track:hover .position-rail-thumb {
            opacity: 0.75;
        }

        /* Empty-state label when no user messages exist */
        .position-rail-empty {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-90deg);
            transform-origin: center;
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 0.12em;
            color: var(--muted);
            white-space: nowrap;
            text-transform: uppercase;
            pointer-events: none;
            opacity: 0.7;
        }

        /* Anchor dots — one per user message, centered on the track */
        .position-anchor {
            position: absolute;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 14px;
            height: 14px;
            background: var(--accent);
            border: 2px solid var(--surface);
            border-radius: 50%;
            cursor: pointer;
            pointer-events: auto;
            z-index: 2;
            box-shadow: 0 0 0 1px var(--accent),
                        0 1px 3px color-mix(in oklab, var(--fg) 12%, transparent);
            transition: transform var(--motion-fast),
                        box-shadow var(--motion-fast);
        }
        .position-anchor:hover {
            transform: translate(-50%, -50%) scale(1.25);
            box-shadow: 0 0 0 1px var(--accent),
                        0 0 0 5px color-mix(in oklab, var(--accent) 22%, transparent);
        }
        .position-anchor.active {
            transform: translate(-50%, -50%) scale(1.2);
            box-shadow: 0 0 0 1px var(--accent),
                        0 0 0 5px color-mix(in oklab, var(--accent) 18%, transparent);
        }

        /* Tooltip — message preview on hover, positioned to the left */
        .position-anchor-tooltip {
            position: absolute;
            right: calc(100% + 8px);
            top: 50%;
            transform: translateY(-50%);
            background: var(--fg);
            color: var(--surface);
            padding: 5px 10px;
            border-radius: var(--radius-sm);
            font-size: var(--text-xs);
            font-family: var(--font-body);
            white-space: nowrap;
            max-width: 220px;
            overflow: hidden;
            text-overflow: ellipsis;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--motion-fast);
            z-index: 10;
        }
        .position-anchor:hover .position-anchor-tooltip,
        .position-anchor.active .position-anchor-tooltip {
            opacity: 1;
        }

        /* Number label — #1, #2, etc. on hover */
        .position-anchor-num {
            position: absolute;
            right: calc(100% + 4px);
            top: 50%;
            transform: translateY(-50%);
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--muted);
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--motion-fast);
        }
        .position-anchor:hover .position-anchor-num,
        .position-anchor.active .position-anchor-num {
            opacity: 1;
            color: var(--accent);
        }

        @media (max-width: 768px) {
            .position-rail { display: none; }
        }

        .message {
            max-width: 85%;
            padding: var(--space-4) var(--space-5);
            border-radius: var(--radius-lg);
            line-height: 1.6;
            word-wrap: break-word;
            animation: fadeIn 0.3s var(--ease-standard);
        }

        .user {
            background: var(--accent-subtle);
            color: var(--fg);
            align-self: flex-end;
            border: 1px solid color-mix(in oklab, var(--accent) 30%, transparent);
            border-bottom-right-radius: var(--radius-sm);
        }

        .assistant {
            background: var(--surface);
            color: var(--fg);
            align-self: flex-start;
            border: 1px solid var(--border);
            border-bottom-left-radius: var(--radius-sm);
            box-shadow: var(--elev-raised);
        }

        .message b {
            display: inline-block;
            font-size: var(--text-xs);
            padding: 2px 8px;
            border-radius: var(--radius-pill);
            margin-bottom: var(--space-2);
            font-weight: 500;
        }
        .user b {
            background: color-mix(in oklab, var(--accent) 25%, transparent);
            color: var(--fg);
        }
        .assistant b {
            background: var(--bg);
            color: var(--muted);
        }

        /* Message typography (marked.js output) */
        .message p { margin: var(--space-2) 0; }
        .message p:first-child { margin-top: 0; }
        .message p:last-child { margin-bottom: 0; }
        .message ul, .message ol { padding-left: var(--space-6); margin: var(--space-2) 0; }
        .message code {
            font-family: var(--font-mono);
            font-size: 0.9em;
            background: var(--bg);
            padding: 1px 5px;
            border-radius: 3px;
            border: 1px solid var(--border);
        }
        .user code {
            background: color-mix(in oklab, var(--fg) 6%, transparent);
            border-color: color-mix(in oklab, var(--accent) 25%, transparent);
            color: var(--fg);
        }
        .message pre {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: var(--space-3);
            overflow-x: auto;
            margin: var(--space-2) 0;
        }
        .message pre code {
            background: none;
            padding: 0;
            border: none;
        }
        .message blockquote {
            border-left: 3px solid var(--accent);
            padding-left: var(--space-3);
            margin: var(--space-2) 0;
            color: var(--muted);
        }
        .message a { color: var(--accent); }
        .message table {
            border-collapse: collapse;
            width: 100%;
            margin: var(--space-2) 0;
            font-size: var(--text-sm);
        }
        .message th, .message td {
            border: 1px solid var(--border);
            padding: var(--space-1) var(--space-2);
        }
        .message th { background: var(--bg); font-weight: 600; }

        /* --- Think Block --- */
        .think-block {
            display: none;
            background: var(--bg);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            padding: var(--space-3) var(--space-4);
            border-radius: var(--radius-sm);
            margin-bottom: var(--space-4);
        }
        .think-block.visible { display: block; }
        .think-block.hidden .think-content { display: none; }

        .think-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-2);
            color: var(--muted);
            font-size: var(--text-xs);
            font-weight: 600;
        }

        .think-content {
            font-size: var(--text-sm);
            color: var(--muted);
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .think-toggle {
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--surface);
            color: var(--muted);
            cursor: pointer;
            font-size: var(--text-xs);
            font-family: var(--font-body);
            padding: 2px 8px;
            transition: all var(--motion-fast) var(--ease-standard);
        }
        .think-toggle:hover {
            background: var(--bg);
            color: var(--fg);
            border-color: var(--muted);
        }
        .think-toggle:focus-visible {
            outline: none;
            box-shadow: var(--focus-ring);
        }

        /* --- Answer Block --- */
        .answer-block b {
            display: inline-block;
            font-size: var(--text-xs);
            color: var(--muted);
            background: var(--bg);
            padding: 2px 8px;
            border-radius: var(--radius-pill);
            margin-bottom: var(--space-2);
            font-weight: 500;
        }

        .message-content {
            line-height: 1.6;
            color: var(--fg);
        }

        /* ═══════════════════════════════════════════════════════════════════
         * Input Area
         * ═══════════════════════════════════════════════════════════════════ */
        .input-box {
            display: flex;
            flex-direction: column;
            padding: var(--space-4) var(--space-6);
            background: var(--surface);
            border-top: 1px solid var(--border);
            gap: var(--space-2);
            flex-shrink: 0;
        }

        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: var(--space-3);
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: var(--space-3) var(--space-4);
            transition: border-color var(--motion-fast) var(--ease-standard),
                        box-shadow var(--motion-fast) var(--ease-standard);
        }
        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: var(--focus-ring);
        }

        .input-box textarea {
            flex: 1;
            border: none;
            background: transparent;
            font-family: var(--font-body);
            font-size: var(--text-base);
            color: var(--fg);
            resize: none;
            outline: none;
            line-height: 1.5;
            padding: var(--space-1) 0;
            min-height: 24px;
            max-height: 200px;
        }

        .input-box textarea::placeholder {
            color: var(--muted);
        }

        .input-actions {
            display: flex;
            align-items: center;
            gap: var(--space-1);
            flex-shrink: 0;
        }

        .send-btn {
            width: 34px;
            height: 34px;
            border: none;
            background: var(--accent);
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-on);
            transition: background var(--motion-fast) var(--ease-standard);
            flex-shrink: 0;
        }
        .send-btn:hover { background: var(--accent-hover); }
        .send-btn:active { background: var(--accent-active); }
        .send-btn:focus-visible {
            outline: none;
            box-shadow: var(--focus-ring);
        }

        .input-toolbar {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: var(--space-3);
            font-size: var(--text-xs);
            color: var(--muted);
        }

        .input-hints {
            display: flex;
            gap: var(--space-3);
        }

        .input-hint {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .kbd {
            font-family: var(--font-mono);
            font-size: 10px;
            padding: 1px 5px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 3px;
            color: var(--muted);
        }

        /* ═══════════════════════════════════════════════════════════════════
         * Focus Ring — global
         * ═══════════════════════════════════════════════════════════════════ */
        button:focus-visible,
        .chip:focus-visible {
            outline: none;
            box-shadow: var(--focus-ring);
        }

        /* ═══════════════════════════════════════════════════════════════════
         * Animations
         * ═══════════════════════════════════════════════════════════════════ */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.0/dist/purify.min.js"></script>
</head>
<body>
    <div class="session-list">
        <div class="session-list-header">
            <div class="session-list-title">会话列表</div>
            <button class="new-chat-btn" id="newChatBtn">＋ 新聊天</button>
        </div>
        <ul id="sessionList"></ul>
    </div>

    <div class="chat-section">
        <div class="top-bar">
            <button class="sync-btn" id="sync-history-btn">同步历史数据</button>
            <select id="modelType">
                <option value="1" selected>阿里百炼</option>
                <option value="2">豆包</option>
                <option value="3">百炼RAG</option>
                <option value="4">阿里百炼MCP</option>
                <option value="5">DeepSeek</option>
                <option value="6">本地模型(Qwen2.5)</option>
            </select>
            <div class="model-picker" id="modelPicker">
                <button type="button" class="model-toggle" id="modelToggle">
                    <span id="modelLabel">阿里百炼</span>
                    <span class="arrow">▾</span>
                </button>
                <div class="model-dropdown" id="modelDropdown">
                    <button type="button" class="model-option active" data-value="1">阿里百炼</button>
                    <button type="button" class="model-option" data-value="2">豆包</button>
                    <button type="button" class="model-option" data-value="3">百炼RAG</button>
                    <button type="button" class="model-option" data-value="4">阿里百炼MCP</button>
                    <button type="button" class="model-option" data-value="5">DeepSeek</button>
                    <button type="button" class="model-option" data-value="6">本地模型</button>
                </div>
            </div>
        </div>

        <div class="chat-scroll-area">
            <div class="chat-container" id="chat-container"></div>
            <aside class="position-rail" id="position-rail" aria-label="消息位置映射轨道">
                <div class="position-rail-track" id="position-rail-track">
                    <div class="position-rail-thumb" id="position-rail-thumb"></div>
                    <div class="position-rail-empty" id="position-rail-empty">MESSAGES</div>
                </div>
            </aside>
        </div>

        <form class="input-box" id="chat-form">
            <div class="input-wrapper">
                <textarea id="question" placeholder="请输入你的问题..." required></textarea>
                <div class="input-actions">
                    <button type="submit" class="send-btn" title="发送 (Enter)">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    </button>
                </div>
            </div>
            <div class="input-toolbar">
                <div class="input-hints">
                    <span class="input-hint"><kbd class="kbd">Enter</kbd> 发送</span>
                    <span class="input-hint"><kbd class="kbd">Shift+Enter</kbd> 换行</span>
                    <span class="input-hint"><kbd class="kbd">↑↓</kbd> 历史</span>
                </div>
            </div>
        </form>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════════════
        // Collapsible model picker
        // ═══════════════════════════════════════════════════════════════════
        const modelPicker = document.getElementById('modelPicker');
        const modelToggle = document.getElementById('modelToggle');
        const modelLabel = document.getElementById('modelLabel');
        const modelDropdown = document.getElementById('modelDropdown');

        modelToggle.addEventListener('click', () => {
            modelPicker.classList.toggle('open');
        });

        modelDropdown.addEventListener('click', (e) => {
            const opt = e.target.closest('.model-option');
            if (!opt) return;
            document.getElementById('modelType').value = opt.dataset.value;
            modelDropdown.querySelectorAll('.model-option').forEach(o => o.classList.remove('active'));
            opt.classList.add('active');
            modelLabel.textContent = opt.textContent;
            modelPicker.classList.remove('open');
        });

        // Click outside to close
        document.addEventListener('click', (e) => {
            if (!modelPicker.contains(e.target)) {
                modelPicker.classList.remove('open');
            }
        });

        // ═══════════════════════════════════════════════════════════════════
        // State
        // ═══════════════════════════════════════════════════════════════════
        let currentSessionId = null, tempSession = true, isSubmitting = false;
        const sessions = {};
        const sessionList = document.getElementById('sessionList');
        const chatContainer = document.getElementById('chat-container');
        const chatForm = document.getElementById('chat-form');
        const questionInput = document.getElementById('question');
        const syncBtn = document.getElementById('sync-history-btn');
        const modelTypeSelect = document.getElementById('modelType');
        const newChatBtn = document.getElementById('newChatBtn');
        const INPUT_HISTORY_KEY = 'ai_input_history';
        const MAX_INPUT_HISTORY = 50;
        let inputHistory = [];
        let historyIndex = -1;

        // ═══════════════════════════════════════════════════════════════════
        // Position Rail — fixed navigation track (flex sibling of chatContainer)
        //   - Anchors: one per user message, proportional % positioning
        //   - Thumb: shows current scroll position (scrollbar replacement)
        //   - Active: highlights the anchor closest to viewport centre
        //   - Track click: jumps to proportional scroll position
        //   - Anchor click: scrolls to that specific user message
        // ═══════════════════════════════════════════════════════════════════
        const positionRail       = document.getElementById('position-rail');
        const positionRailTrack  = document.getElementById('position-rail-track');
        const positionRailThumb  = document.getElementById('position-rail-thumb');
        const positionRailEmpty  = document.getElementById('position-rail-empty');

        function getScrollMetrics() {
            const sh = chatContainer.scrollHeight;
            const ch = chatContainer.clientHeight;
            const st = chatContainer.scrollTop;
            return { scrollHeight: sh, clientHeight: ch, scrollTop: st,
                     scrollRange: Math.max(1, sh - ch) };
        }

        function updatePositionRail() {
            if (!positionRailTrack) return;
            const userMessages = chatContainer.querySelectorAll('.message.user');
            const existing = positionRailTrack.querySelectorAll('.position-anchor');

            // Toggle empty hint
            if (positionRailEmpty)
                positionRailEmpty.style.display = userMessages.length === 0 ? '' : 'none';

            // Remove excess anchors
            while (existing.length > userMessages.length) {
                const last = positionRailTrack.querySelector('.position-anchor:last-child');
                if (last) last.remove();
            }

            const { scrollHeight } = getScrollMetrics();

            userMessages.forEach((msg, i) => {
                let anchor = positionRailTrack.querySelectorAll('.position-anchor')[i];
                if (!anchor) {
                    anchor = document.createElement('div');
                    anchor.className = 'position-anchor';
                    anchor.dataset.index = String(i);

                    // Number label
                    const num = document.createElement('div');
                    num.className = 'position-anchor-num';
                    anchor.appendChild(num);

                    // Tooltip
                    const tip = document.createElement('div');
                    tip.className = 'position-anchor-tooltip';
                    anchor.appendChild(tip);

                    // Click → scroll to that user message
                    anchor.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const targetTop = msg.offsetTop - 60;
                        chatContainer.scrollTo({ top: Math.max(0, targetTop), behavior: 'smooth' });
                    });

                    positionRailTrack.appendChild(anchor);
                }

                // Proportional position (midpoint / total scroll height * 100%)
                const msgCenter = msg.offsetTop + msg.offsetHeight / 2;
                const pct = (msgCenter / scrollHeight) * 100;
                anchor.style.top = pct + '%';

                // Number label
                const numEl = anchor.querySelector('.position-anchor-num');
                if (numEl) numEl.textContent = '#' + (i + 1);

                // Tooltip: first ~40 chars of message, whitespace-normalised
                const badge = msg.querySelector('b');
                let text = msg.textContent.trim();
                if (badge) text = text.replace(badge.textContent, '').trim();
                const tipEl = anchor.querySelector('.position-anchor-tooltip');
                if (tipEl) tipEl.textContent =
                    text.replace(/\s+/g, ' ').substring(0, 40) || ('消息 ' + (i + 1));
            });

            updateThumb();
            updateActiveAnchor();
        }

        function updateThumb() {
            if (!positionRailThumb) return;
            const { scrollHeight, clientHeight, scrollTop, scrollRange } = getScrollMetrics();
            const thumbPct = (clientHeight / scrollHeight) * 100;
            const usable = Math.max(0, 100 - thumbPct);
            positionRailThumb.style.height = thumbPct + '%';
            positionRailThumb.style.top  = (scrollTop / scrollRange) * usable + '%';
        }

        function updateActiveAnchor() {
            const userMessages = chatContainer.querySelectorAll('.message.user');
            const anchors = positionRailTrack.querySelectorAll('.position-anchor');
            if (userMessages.length === 0 || anchors.length === 0) return;

            const { scrollTop, clientHeight } = getScrollMetrics();
            const viewportCenter = scrollTop + clientHeight / 2;

            let activeIdx = 0, minDist = Infinity;
            userMessages.forEach((msg, i) => {
                const d = Math.abs(msg.offsetTop + msg.offsetHeight / 2 - viewportCenter);
                if (d < minDist) { minDist = d; activeIdx = i; }
            });
            anchors.forEach((a, i) => a.classList.toggle('active', i === activeIdx));
        }

        // Track click → proportional scroll jump (ignore clicks on anchors)
        positionRailTrack.addEventListener('click', (e) => {
            if (e.target.closest('.position-anchor')) return;
            const rect = positionRailTrack.getBoundingClientRect();
            const clickPct = (e.clientY - rect.top) / rect.height;
            const { scrollHeight, clientHeight } = getScrollMetrics();
            chatContainer.scrollTo({
                top: clickPct * (scrollHeight - clientHeight),
                behavior: 'smooth'
            });
        });

        // Scroll → update thumb + active anchor
        chatContainer.addEventListener('scroll', () => {
            updateThumb();
            updateActiveAnchor();
        });

        // DOM changes + resize → rebuild anchors
        const railMutationObs = new MutationObserver(() => updatePositionRail());
        railMutationObs.observe(chatContainer, { childList: true, subtree: true, characterData: true });

        if (typeof ResizeObserver !== 'undefined') {
            const railResizeObs = new ResizeObserver(() => updatePositionRail());
            railResizeObs.observe(chatContainer);
            railResizeObs.observe(positionRailTrack);
        }

        let resizeDebounce = 0;
        window.addEventListener('resize', () => {
            clearTimeout(resizeDebounce);
            resizeDebounce = setTimeout(() => updatePositionRail(), 100);
        });

        function saveInputHistory() {
            const val = questionInput.value;
            if (val.trim()) {
                inputHistory = inputHistory.filter(v => v !== val);
                inputHistory.unshift(val);
                if (inputHistory.length > MAX_INPUT_HISTORY) inputHistory.pop();
                localStorage.setItem(INPUT_HISTORY_KEY, JSON.stringify(inputHistory));
            }
        }

        function loadInputHistory() {
            try {
                inputHistory = JSON.parse(localStorage.getItem(INPUT_HISTORY_KEY) || '[]');
            } catch { inputHistory = []; }
        }

        function navigateHistory(dir) {
            if (inputHistory.length === 0) return;
            if (historyIndex === -1) historyIndex = 0;
            historyIndex = Math.max(0, Math.min(inputHistory.length - 1, historyIndex + dir));
            questionInput.value = inputHistory[historyIndex];
            questionInput.selectionStart = questionInput.selectionEnd = questionInput.value.length;
        }

        questionInput.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                chatForm.requestSubmit();
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                navigateHistory(1);
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                navigateHistory(-1);
            }
        });

        loadInputHistory();

        function appendMessage(role, content) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', role);
            const safeHtml = DOMPurify.sanitize(marked.parse(content));
            msgDiv.innerHTML = `<b>${role === 'user' ? '你' : 'AI'}</b><br>${safeHtml}`;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return msgDiv;
        }

        function clearMessages() { chatContainer.innerHTML = ''; }

        function renderSessionList() {
            sessionList.innerHTML = '';
            for (let id in sessions) {
                const li = document.createElement('li');
                li.dataset.id = id;
                if (id === currentSessionId) li.classList.add('active');
                li.style.display = 'flex';
                li.style.alignItems = 'center';
                li.style.justifyContent = 'space-between';

                const nameSpan = document.createElement('span');
                nameSpan.textContent = sessions[id].name || `会话 ${id}`;
                nameSpan.style.flex = '1';
                nameSpan.style.overflow = 'hidden';
                nameSpan.style.textOverflow = 'ellipsis';
                nameSpan.style.whiteSpace = 'nowrap';
                nameSpan.style.cursor = 'pointer';
                nameSpan.onclick = () => switchSession(id);

                const delBtn = document.createElement('button');
                delBtn.textContent = '🗑';
                delBtn.title = '删除会话';
                delBtn.style.cssText = 'border:none;background:transparent;cursor:pointer;font-size:14px;padding:0 4px;opacity:0.6;transition:opacity 0.15s;';
                delBtn.onmouseenter = () => { delBtn.style.opacity = '1'; };
                delBtn.onmouseleave = () => { delBtn.style.opacity = '0.6'; };
                delBtn.onclick = (e) => { e.stopPropagation(); deleteSession(id); };

                li.appendChild(nameSpan);
                li.appendChild(delBtn);
                sessionList.appendChild(li);
            }
        }

        async function deleteSession(id) {
            if (!confirm('确定删除该会话及其全部聊天记录吗？')) return;
            try {
                const res = await fetch('/chat/delete-session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId: String(id) })
                });
                const data = await res.json();
                if (data.success) {
                    delete sessions[id];
                    if (String(id) === currentSessionId) {
                        currentSessionId = 'temp';
                        tempSession = true;
                        clearMessages();
                    }
                    renderSessionList();
                } else {
                    alert('删除失败: ' + (data.message || '未知错误'));
                }
            } catch (err) {
                console.error('删除会话失败', err);
                alert('删除失败: 无法连接到服务器');
            }
        }

        async function switchSession(id) {
            currentSessionId = String(id); tempSession = false; clearMessages();
            if (!sessions[id].messages || sessions[id].messages.length === 0) {
                try {
                    const res = await fetch('/chat/history', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ sessionId: currentSessionId }) });
                    const data = await res.json();
                    if (data.success && Array.isArray(data.history)) {
                        sessions[id].messages = [];
                        data.history.forEach(item => { sessions[id].messages.push({ role: item.is_user ? 'user' : 'assistant', content: item.content }); });
                    }
                } catch (err) { console.error('获取历史失败', err); }
            }
            sessions[id].messages.forEach(m => appendMessage(m.role, m.content));
            renderSessionList();
        }

        newChatBtn.addEventListener('click', () => {
            currentSessionId = 'temp';
            tempSession = true;
            clearMessages();
        });

        // SSE 流式处理函数
        async function streamAIResponse(question, modelType, sessionId) {
            const response = await fetch('/chat/stream', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question, modelType, sessionId })
            });
            if (!response.ok) {
                appendMessage('assistant', '[错误] 服务器错误: ' + response.status);
                return;
            }
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let lineBuffer = '';

            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', 'assistant');
            msgDiv.innerHTML = `
                <div class="think-block">
                    <div class="think-header">
                        <span>💭 思考中…</span>
                        <button class="think-toggle" type="button">隐藏</button>
                    </div>
                    <div class="think-content"></div>
                </div>
                <div class="answer-block">
                    <b>AI</b><br><div class="message-content"></div>
                </div>
            `;
            chatContainer.appendChild(msgDiv);
            const thinkBlock = msgDiv.querySelector('.think-block');
            const thinkContentDiv = msgDiv.querySelector('.think-content');
            const contentDiv = msgDiv.querySelector('.message-content');
            const thinkToggle = msgDiv.querySelector('.think-toggle');
            thinkToggle.addEventListener('click', () => {
                thinkBlock.classList.toggle('hidden');
                thinkToggle.textContent = thinkBlock.classList.contains('hidden') ? '显示' : '隐藏';
            });

            let thinkText = '';
            let fullText = '';

            let pendingFrame = null;
            let dirtyThink = false;
            let dirtyContent = false;

            const renderTextPlain = (el, text) => {
                el.textContent = text;
            };

            const renderFinalMarkdown = () => {
                if (thinkText) {
                    thinkContentDiv.innerHTML = DOMPurify.sanitize(marked.parse(thinkText));
                }
                if (fullText) {
                    contentDiv.innerHTML = DOMPurify.sanitize(marked.parse(fullText));
                }
            };

            const flushDirty = () => {
                if (dirtyThink) {
                    renderTextPlain(thinkContentDiv, thinkText);
                    dirtyThink = false;
                }
                if (dirtyContent) {
                    renderTextPlain(contentDiv, fullText);
                    dirtyContent = false;
                }
            };

            let finalRendered = false;
            const flushAndRenderFinal = () => {
                if (finalRendered) return;
                finalRendered = true;
                if (pendingFrame !== null) {
                    cancelAnimationFrame(pendingFrame);
                    pendingFrame = null;
                }
                flushDirty();
                renderFinalMarkdown();
            };

            const scheduleRender = () => {
                if (pendingFrame !== null) return;
                pendingFrame = requestAnimationFrame(() => {
                    pendingFrame = null;
                    flushDirty();
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                });
            };

            const handleData = (dataStr) => {
                if (dataStr === '[DONE]') {
                    flushAndRenderFinal();
                    return;
                }
                try {
                    const j = JSON.parse(dataStr);
                    if (j.sessionId) {
                        const newId = String(j.sessionId);
                        sessions[newId] = {
                            name: question.length > 15 ? question.substring(0, 15) + '...' : question,
                            messages: [{ role: 'user', content: question }]
                        };
                        currentSessionId = newId;
                        tempSession = false;
                        renderSessionList();
                        return;
                    }
                    if (j.error) {
                        contentDiv.innerHTML = DOMPurify.sanitize(marked.parse('[错误] ' + j.error));
                        return;
                    }
                    if (j.reasoning) {
                        if (!thinkBlock.classList.contains('visible')) {
                            thinkBlock.classList.add('visible');
                        }
                        thinkText += j.reasoning;
                        dirtyThink = true;
                        scheduleRender();
                        return;
                    }
                    if (j.content) {
                        fullText += j.content;
                        dirtyContent = true;
                        scheduleRender();
                    }
                } catch (e) {}
            };

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                const chunk = decoder.decode(value, { stream: !done });
                for (const char of chunk) {
                    if (char === '\n') {
                        if (lineBuffer.startsWith('data: ')) {
                            handleData(lineBuffer.slice(6));
                        }
                        lineBuffer = '';
                    } else {
                        lineBuffer += char;
                    }
                }
            }
            if (lineBuffer.startsWith('data: ')) {
                handleData(lineBuffer.slice(6));
            }

            flushAndRenderFinal();

            if (fullText && sessions[currentSessionId]) {
                sessions[currentSessionId].messages.push({ role: 'assistant', content: fullText });
            }
        }

        chatForm.addEventListener('submit', async e => {
            e.preventDefault();
            if (isSubmitting) return;
            isSubmitting = true;
            const question = questionInput.value.trim();
            if (!question) { isSubmitting = false; return; }

            appendMessage('user', question);

            try {
                if (!tempSession && sessions[currentSessionId]) {
                    sessions[currentSessionId].messages.push({ role: 'user', content: question });
                }
                await streamAIResponse(question, modelTypeSelect.value, tempSession ? '' : currentSessionId);

                questionInput.value = '';
                saveInputHistory();
                historyIndex = -1;
            } catch (err) {
                console.error('发送失败', err);
                appendMessage('assistant', '[错误] 发送失败: ' + err.message);
            } finally {
                isSubmitting = false;
            }
        });

        syncBtn.addEventListener('click', async () => {
            if (!currentSessionId || tempSession) {
                alert('请选择已有会话进行同步');
                return;
            }
            try {
                const res = await fetch('/chat/history', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId: currentSessionId })
                });
                const data = await res.json();
                if (data.success && Array.isArray(data.history)) {
                    sessions[currentSessionId].messages = [];
                    clearMessages();
                    data.history.forEach(item => {
                        appendMessage(item.is_user ? 'user' : 'assistant', item.content);
                        sessions[currentSessionId].messages.push({ role: item.is_user ? 'user' : 'assistant', content: item.content });
                    });
                } else {
                    alert('[错误] 无法获取历史数据');
                }
            } catch (err) {
                console.error(err);
                alert('[错误] 请求历史数据失败');
            }
        });

        async function loadSessions() {
            try {
                const res = await fetch('/chat/sessions');
                const data = await res.json();
                if (data.success && Array.isArray(data.sessions)) {
                    data.sessions.forEach(s => {
                        const sid = String(s.sessionId);
                        sessions[sid] = { name: s.name || `会话 ${sid}`, messages: [] };
                    });
                    renderSessionList();
                }
                if (Object.keys(sessions).length === 0) {
                    currentSessionId = null;
                    tempSession = true;
                }
            } catch (err) {
                console.error('获取会话列表失败', err);
                currentSessionId = null;
                tempSession = true;
            }
        }

        if (sessionStorage.getItem('userId')) {
            loadSessions();
        } else {
            window.location.href = '/entry';
        }
    </script>
</body>
</html>
